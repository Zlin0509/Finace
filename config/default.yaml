# 基金智能分析助手 - 默认配置

# 数据源配置
dataSources:
  primary: "akshare"          # 主数据源: akshare | eastmoney
  cacheEnabled: true
  cacheTtlHours: 6            # 缓存有效期(小时)
  cachePath: "data/cache"
  stockMarket:
    provider: "hithink"
    baseUrl: "https://fuyao.aicubes.cn"
    timeoutSeconds: 10

# 持仓配置
portfolio:
  dataPath: "data/fundmaster.db"
  legacyDataPath: "data/portfolio.json"
  currency: "CNY"
  benchmarkIndex: "000300"     # 默认基准：沪深300

# 本地持久化
storage:
  databasePath: "data/fundmaster.db"
  legacyPortfolioPath: "data/portfolio.json"
  backupPath: "data/backups"
  autoBackupHours: 24

# 分析配置
analysis:
  riskFreeRate: 0.02           # 无风险利率(年化)
  tradingDaysPerYear: 244      # 年交易日数
  lookbackDays: 365            # 默认回看天数
  maxDrawdownWindow: 252       # 最大回撤计算窗口

# 回测配置
backtest:
  defaultStartDate: "2020-01-01"
  transactionCostRate: 0.0015  # 交易成本(申购费率)
  redeemCostRate: 0.005        # 赎回费率
  minHoldDays: 7               # 最短持有天数(免赎回费)

# 新闻检索配置
news:
  cacheTtlMinutes: 30
  cachePath: "data/cache/news"

# 策略配置
strategy:
  # 定投策略
  dca:
    defaultAmount: 1000        # 每期定投金额
    frequency: "monthly"       # weekly | biweekly | monthly
  # 网格策略
  grid:
    gridCount: 10              # 网格数量
    upperBound: 1.2            # 上界(相对均价倍数)
    lowerBound: 0.8            # 下界
  # 动态平衡
  rebalance:
    threshold: 0.05            # 偏离阈值触发调仓
    frequency: "quarterly"     # monthly | quarterly | yearly

# 输出配置
output:
  reportPath: "data/export"
  format: "console"            # console | html | pdf
  chartStyle: "seaborn-v0_8-whitegrid"
